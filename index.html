<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Comunicacao Aumentativa Assistida</title>
</head>
<body>

    <h1>Comunicacao</h1>

    <input 
        id="mensagem"
        type="text"
        placeholder="Toque em um botão..."
        readonly>

    <div class="acoes">
        
        
        <button id="btnFalar">
            🔈Falar
        </button>

        <button id="btnLimpar">
        🗑 Limpar
        </button>

    </div>

    <div class = "cards">

        <button id="agua">
            💧 Água
        </button>

        <button id="banheiro">
            🚽 Banheiro
        </button>

        <button id="dor">
            😢 Dor
        </button>

    </div>



    <script src="script.js"> 

    </script>




    
</body>
</html>
